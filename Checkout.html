<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EchoDupe | Checkout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .bg-grid {
            background-size: 50px 50px;
            background-image: linear-gradient(to right, rgba(6, 182, 212, 0.05) 1px, transparent 1px), 
                              linear-gradient(to bottom, rgba(6, 182, 212, 0.05) 1px, transparent 1px);
            position: fixed; inset: 0; z-index: -1;
        }
        .checkout-container { background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(6, 182, 212, 0.1); }
        
        .glowing-selection {
            position: relative;
            background: rgba(10, 10, 10, 0.9);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .glowing-selection::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, transparent, #06b6d4);
            animation: rotate 4s linear infinite;
            z-index: 0;
        }
        .glowing-selection::after {
            content: '';
            position: absolute;
            inset: 2px;
            background: #0a0a0a;
            border-radius: 18px;
            z-index: 1;
        }
        .selection-content { position: relative; z-index: 2; }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .platform-card, .payment-card { 
            filter: grayscale(1); 
            opacity: 0.4; 
            transition: all 0.3s ease; 
        }
        .active { 
            filter: grayscale(0) !important; 
            opacity: 1 !important; 
            transform: scale(1.02);
        }
        .platform-card:not(.active)::before { display: none; }
    </style>
</head>
<body class="p-6">
    <div class="bg-grid"></div>

    <div class="max-w-4xl mx-auto pt-20 pb-20">
        <h1 class="text-5xl font-black italic uppercase tracking-tighter mb-10 text-center">Final <span class="text-cyan-500">Checkout</span></h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="checkout-container p-8 rounded-[40px]">
                <h2 class="text-xs font-black uppercase mb-6 text-zinc-500 tracking-[0.2em]">Order Summary</h2>
                <div id="summary-items" class="space-y-3"></div>
                <div class="border-t border-white/10 mt-8 pt-6">
                    <p class="text-[10px] font-black text-zinc-500 uppercase">Grand Total</p>
                    <p id="summary-total" class="text-4xl font-black text-white">$0.00</p>
                </div>
            </div>

            <div class="checkout-container p-8 rounded-[40px] flex flex-col gap-6">
                
                <div>
                    <h2 class="text-xs font-black uppercase text-zinc-500 tracking-[0.2em] mb-4">Select a Platform</h2>
                    <div class="grid grid-cols-2 gap-4">
                        <div id="platform-bedrock" onclick="togglePlatform('Bedrock')" class="platform-card glowing-selection p-[2px]">
                            <div class="selection-content p-6 text-center">
                                <p class="text-4xl mb-1">🎮</p>
                                <p class="font-black text-white text-xs tracking-widest uppercase">Bedrock</p>
                            </div>
                        </div>
                        <div id="platform-java" onclick="togglePlatform('Java')" class="platform-card glowing-selection p-[2px]">
                            <div class="selection-content p-6 text-center">
                                <p class="text-4xl mb-1">💻</p>
                                <p class="font-black text-white text-xs tracking-widest uppercase">Java</p>
                            </div>
                        </div>
                    </div>
                    <p id="platform-status" class="text-[10px] font-black uppercase text-cyan-500 mt-3 tracking-widest text-center">Selected: None</p>
                </div>

                <input type="text" id="final-username" placeholder="MINECRAFT USERNAME" 
                       class="w-full bg-zinc-900/50 border border-white/10 rounded-2xl p-5 text-white font-bold focus:border-cyan-500 outline-none transition-all placeholder:text-zinc-700">

                <div class="grid grid-cols-2 gap-4">
                    <div id="method-cash" onclick="setPayment('CashApp')" class="payment-card active p-6 bg-zinc-900/50 border border-white/5 rounded-3xl flex flex-col items-center">
                        <img src="assets/CashApp.png" alt="CashApp" class="h-8 mb-2 object-contain">
                        <span class="text-[10px] font-black uppercase">CashApp</span>
                    </div>
                    <div id="method-paypal" onclick="setPayment('PayPal')" class="payment-card p-6 bg-zinc-900/50 border border-white/5 rounded-3xl flex flex-col items-center">
                        <img src="assets/PayPal.png" alt="PayPal" class="h-8 mb-2 object-contain">
                        <span class="text-[10px] font-black uppercase">PayPal</span>
                    </div>
                </div>

                <div class="bg-cyan-500/5 border border-cyan-500/20 p-6 rounded-3xl">
                    <p id="instr-title" class="text-[10px] font-black uppercase text-cyan-500 mb-1">Pay to CashTag</p>
                    <p id="instr-value" class="text-xl font-black text-white">$YourCashTag</p>
                </div>

                <button onclick="submitToDiscord()" class="w-full bg-cyan-500 text-black py-6 rounded-2xl font-black uppercase tracking-widest hover:bg-white transition-all shadow-[0_0_30px_rgba(6,182,212,0.3)]">
                    Submit Order
                </button>
            </div>
        </div>
    </div>

    <script>
        let selectedPlatform = null;
        let selectedMethod = 'CashApp';
        const cart = JSON.parse(localStorage.getItem('echo_cart')) || {};

        function togglePlatform(platform) {
            const statusText = document.getElementById('platform-status');
            
            if (selectedPlatform === platform) {
                // If clicking the same one, unselect both
                selectedPlatform = null;
                document.getElementById('platform-bedrock').classList.remove('active');
                document.getElementById('platform-java').classList.remove('active');
                statusText.innerText = "Selected: None";
            } else {
                // Select the new one
                selectedPlatform = platform;
                document.getElementById('platform-bedrock').classList.toggle('active', platform === 'Bedrock');
                document.getElementById('platform-java').classList.toggle('active', platform === 'Java');
                statusText.innerText = `Selected: ${platform}`;
            }
        }

        function setPayment(method) {
            selectedMethod = method;
            document.getElementById('method-cash').classList.toggle('active', method === 'CashApp');
            document.getElementById('method-paypal').classList.toggle('active', method === 'PayPal');
            const title = document.getElementById('instr-title');
            const val = document.getElementById('instr-value');
            if(method === 'CashApp') {
                title.innerText = "Pay to CashTag";
                val.innerText = "$YourCashTag";
            } else {
                title.innerText = "Pay to PayPal Email";
                val.innerText = "your@email.com";
            }
        }

        function renderSummary() {
            const container = document.getElementById('summary-items');
            const totalDisplay = document.getElementById('summary-total');
            let total = 0;
            const ids = Object.keys(cart);
            if(ids.length === 0) {
                container.innerHTML = `<p class="text-zinc-700 font-black uppercase text-xs italic">Cart is empty</p>`;
                return;
            }
            container.innerHTML = ids.map(id => {
                const item = cart[id];
                const qty = item.totalQty || item.quantity || 1;
                let price = item.price * qty;
                if (id.startsWith('key_') && qty >= 5) price *= 0.8576; 
                total += price;
                return `
                <div class="flex justify-between items-center bg-white/[0.03] p-4 rounded-2xl border border-white/5">
                    <p class="font-black uppercase text-[11px]">${item.name} (x${qty})</p>
                    <p class="font-black text-sm text-cyan-500">$${price.toFixed(2)}</p>
                </div>`;
            }).join('');
            totalDisplay.innerText = `$${total.toFixed(2)}`;
        }

        async function submitToDiscord() {
            const mcUser = document.getElementById('final-username').value.trim();
            const WEBHOOK_URL = "YOUR_DISCORD_WEBHOOK_URL_HERE";

            if (!selectedPlatform) return alert("Platform selection is required!");
            if (!mcUser) return alert("Please enter your Minecraft Username!");
            if (Object.keys(cart).length === 0) return alert("Cart is empty!");

            const itemsList = Object.keys(cart).map(id => `- **${cart[id].name}** (x${cart[id].totalQty || cart[id].quantity || 1})`).join('\n');

            const payload = {
                username: "EchoDupe Shop",
                embeds: [{
                    title: "🚀 NEW ORDER RECEIVED",
                    color: 0x06b6d4,
                    fields: [
                        { name: "👤 User", value: mcUser, inline: true },
                        { name: "🎮 Platform", value: selectedPlatform, inline: true },
                        { name: "💳 Method", value: selectedMethod, inline: true },
                        { name: "💰 Total", value: document.getElementById('summary-total').innerText, inline: true },
                        { name: "📦 Items", value: itemsList || "None" }
                    ],
                    footer: { text: "EchoDupe Log • " + new Date().toLocaleString() }
                }]
            };

            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    alert("Order Submitted! Please complete payment to receive your items.");
                } else {
                    alert("Failed to send to Discord. Check your Webhook URL.");
                }
            } catch (err) {
                alert("Error connecting to Discord.");
            }
        }

        renderSummary();
    </script>
</body>
</html>
