<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EchoDupe | Checkout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .bg-grid {
            background-size: 50px 50px;
            background-image: linear-gradient(to right, rgba(6, 182, 212, 0.05) 1px, transparent 1px), 
                              linear-gradient(to bottom, rgba(6, 182, 212, 0.05) 1px, transparent 1px);
            position: fixed; inset: 0; z-index: -1;
        }
        .checkout-container { background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(6, 182, 212, 0.1); }
        
        /* The Animated Blue Light Border */
        .glowing-selection {
            position: relative;
            background: rgba(10, 10, 10, 0.9);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .glowing-selection:hover { transform: scale(1.02); }
        .glowing-selection::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, transparent, #06b6d4);
            animation: rotate 4s linear infinite;
            z-index: 0;
        }
        .glowing-selection::after {
            content: '';
            position: absolute;
            inset: 2px;
            background: #0a0a0a;
            border-radius: 18px;
            z-index: 1;
        }
        .selection-content { position: relative; z-index: 2; }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .platform-card { 
            border: 2px solid rgba(255,255,255,0.05); 
            transition: all 0.3s ease; 
            cursor: pointer;
            filter: grayscale(1);
            opacity: 0.5;
        }
        .platform-card.active { 
            border-color: #06b6d4; 
            background: rgba(6, 182, 212, 0.1); 
            filter: grayscale(0);
            opacity: 1;
        }

        .payment-card { 
            border: 2px solid rgba(255,255,255,0.05); 
            transition: all 0.3s ease; 
            cursor: pointer;
            filter: grayscale(1);
            opacity: 0.5;
        }
        .payment-card.active { 
            border-color: #06b6d4; 
            background: rgba(6, 182, 212, 0.1); 
            filter: grayscale(0);
            opacity: 1;
        }
    </style>
</head>
<body class="p-6">
    <div class="bg-grid"></div>

    <div class="max-w-4xl mx-auto pt-20 pb-20">
        <h1 class="text-5xl font-black italic uppercase tracking-tighter mb-10 text-center">Complete <span class="text-cyan-500">Order</span></h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="checkout-container p-8 rounded-[40px]">
                <h2 class="text-xs font-black uppercase mb-6 text-zinc-500 tracking-[0.2em]">Order Summary</h2>
                <div id="summary-items" class="space-y-3"></div>
                
                <div class="border-t border-white/10 mt-8 pt-6">
                    <p class="text-[10px] font-black text-zinc-500 uppercase">Grand Total</p>
                    <p id="summary-total" class="text-4xl font-black text-white">$0.00</p>
                </div>
            </div>

            <div class="checkout-container p-8 rounded-[40px] flex flex-col gap-6">
                <h2 class="text-xs font-black uppercase text-zinc-500 tracking-[0.2em]">Select Platform</h2>
                <div class="grid grid-cols-2 gap-4">
                    <div id="platform-bedrock" onclick="setPlatform('Bedrock')" class="platform-card active glowing-selection p-[2px]">
                        <div class="selection-content p-4 text-center">
                            <p class="text-[10px] font-black uppercase text-zinc-500">Edition</p>
                            <p class="font-bold text-white text-2xl">🎮 BEDROCK</p>
                        </div>
                    </div>
                    <div id="platform-java" onclick="setPlatform('Java')" class="platform-card glowing-selection p-[2px]">
                        <div class="selection-content p-4 text-center">
                            <p class="text-[10px] font-black uppercase text-zinc-500">Edition</p>
                            <p class="font-bold text-white text-2xl">💻 JAVA</p>
                        </div>
                    </div>
                </div>

                <h2 class="text-xs font-black uppercase text-zinc-500 tracking-[0.2em] mt-2">Delivery Info</h2>
                <input type="text" id="final-username" placeholder="MINECRAFT USERNAME" 
                       class="w-full bg-zinc-900/50 border border-white/10 rounded-2xl p-5 text-white font-bold focus:border-cyan-500 outline-none transition-all placeholder:text-zinc-700">

                <h2 class="text-xs font-black uppercase text-zinc-500 tracking-[0.2em] mt-2">Select Method</h2>
                <div class="grid grid-cols-2 gap-4">
                    <div id="method-cash" onclick="setPayment('CashApp')" class="payment-card active p-6 rounded-3xl flex flex-col items-center">
                        <img src="assets/CashApp.png" alt="CashApp" class="h-8 mb-2 object-contain">
                        <span class="text-[10px] font-black uppercase">CashApp</span>
                    </div>
                    <div id="method-paypal" onclick="setPayment('PayPal')" class="payment-card p-6 rounded-3xl flex flex-col items-center">
                        <img src="assets/PayPal.png" alt="PayPal" class="h-8 mb-2 object-contain">
                        <span class="text-[10px] font-black uppercase">PayPal</span>
                    </div>
                </div>

                <div class="bg-white/5 border border-white/5 p-6 rounded-3xl">
                    <p id="instr-title" class="text-[10px] font-black uppercase text-cyan-500 mb-1">Pay to CashTag</p>
                    <p id="instr-value" class="text-xl font-black text-white">$YourCashTag</p>
                </div>

                <button onclick="submitToDiscord()" class="w-full bg-cyan-500 text-black py-6 rounded-2xl font-black uppercase tracking-widest hover:bg-white transition-all shadow-[0_0_30px_rgba(6,182,212,0.3)]">
                    Submit Order
                </button>
                <a href="index.html" class="text-center text-[10px] font-black uppercase text-zinc-600 hover:text-cyan-500 transition-colors">← Back to shop</a>
            </div>
        </div>
    </div>

    <script>
        let selectedPlatform = 'Bedrock'; // Default to Bedrock
        let selectedMethod = 'CashApp';
        const cart = JSON.parse(localStorage.getItem('echo_cart')) || {};

        // Function to handle platform selection
        function setPlatform(platform) {
            selectedPlatform = platform;
            document.getElementById('platform-bedrock').classList.toggle('active', platform === 'Bedrock');
            document.getElementById('platform-java').classList.toggle('active', platform === 'Java');
        }

        function setPayment(method) {
            selectedMethod = method;
            document.getElementById('method-cash').classList.toggle('active', method === 'CashApp');
            document.getElementById('method-paypal').classList.toggle('active', method === 'PayPal');
            const title = document.getElementById('instr-title');
            const val = document.getElementById('instr-value');
            if(method === 'CashApp') {
                title.innerText = "Pay to CashTag";
                val.innerText = "$YourCashTag"; // EDIT THIS
            } else {
                title.innerText = "Pay to PayPal Email";
                val.innerText = "your@email.com"; // EDIT THIS
            }
        }

        function renderSummary() {
            const container = document.getElementById('summary-items');
            const totalDisplay = document.getElementById('summary-total');
            let total = 0;
            const ids = Object.keys(cart);
            if(ids.length === 0) {
                container.innerHTML = `<p class="text-zinc-700 font-black uppercase text-xs italic">No items found...</p>`;
                return;
            }
            container.innerHTML = ids.map(id => {
                const item = cart[id];
                const qty = item.totalQty || item.quantity || 1;
                let price = item.price * qty;
                if (id.startsWith('key_') && qty >= 5) price *= 0.8576; 
                total += price;
                return `
                <div class="flex justify-between items-center bg-white/[0.03] p-4 rounded-2xl border border-white/5">
                    <p class="font-black uppercase text-[11px]">${item.name} (x${qty})</p>
                    <p class="font-black text-sm text-cyan-500">$${price.toFixed(2)}</p>
                </div>`;
            }).join('');
            totalDisplay.innerText = `$${total.toFixed(2)}`;
        }

        async function submitToDiscord() {
            const mcUser = document.getElementById('final-username').value.trim();
            const WEBHOOK_URL = "YOUR_DISCORD_WEBHOOK_URL_HERE"; 
            if (!mcUser) return alert("Please enter your Minecraft Username!");
            if (WEBHOOK_URL === "YOUR_DISCORD_WEBHOOK_URL_HERE") {
                alert("Developer: Please set the Discord Webhook URL in the script.");
                return;
            }
            if (Object.keys(cart).length === 0) return alert("Your cart is empty!");

            const itemsList = Object.keys(cart).map(id => `- **${cart[id].name}** (x${cart[id].totalQty || cart[id].quantity || 1})`).join('\n');

            const payload = {
                username: "EchoDupe Order Log",
                embeds: [{
                    title: "🚀 NEW ORDER RECEIVED",
                    color: 0x06b6d4,
                    fields: [
                        { name: "👤 Customer", value: `\`${mcUser}\``, inline: true },
                        { name: "🎮 Platform", value: `\`${selectedPlatform}\``, inline: true }, // Added platform to Discord payload
                        { name: "💳 Method", value: `\`${selectedMethod}\``, inline: true },
                        { name: "💰 Total", value: document.getElementById('summary-total').innerText, inline: true },
                        { name: "📦 Items Ordered", value: itemsList || "No items" }
                    ],
                    footer: { text: "EchoDupe Automated Shop • " + new Date().toLocaleString() }
                }]
            };

            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    alert("Order Logged! Please send payment now to receive your items.");
                    // Optional: localStorage.clear();
                    // window.location.href = "success.html";
                } else {
                    alert("Order failed to send. Please check your Webhook URL or Discord settings.");
                }
            } catch (error) {
                console.error("Webhook Error:", error);
                alert("Connection error occurred. Check your internet or webhook URL.");
            }
        }

        // Initialize payment and platform selection on load
        setPlatform(selectedPlatform);
        setPayment(selectedMethod);
        renderSummary();
    </script>
</body>
</html>
