<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EchoDupe | Keys</title>
    <link rel="icon" type="image/png" href="assets/logo.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        .bg-grid {
            background-size: 50px 50px;
            background-image: linear-gradient(to right, rgba(6, 182, 212, 0.05) 1px, transparent 1px), 
                              linear-gradient(to bottom, rgba(6, 182, 212, 0.05) 1px, transparent 1px);
            position: fixed; inset: 0; z-index: -1;
        }

        /* --- MATCHED GLOW FROM RANK SHOP --- */
        .title-container {
            position: relative;
            display: inline-block;
            isolation: isolate;
        }

        .matched-glow {
            position: absolute;
            inset: -15px -40%; 
            background: linear-gradient(to right, 
                rgba(255, 255, 255, 0) 0%, 
                rgba(255, 255, 255, 0.3) 35%,   
                rgba(130, 235, 255, 0.4) 50%,  
                rgba(6, 182, 212, 0.3) 65%,    
                rgba(6, 182, 212, 0) 100%
            );
            filter: blur(60px);
            mix-blend-mode: screen; 
            z-index: -1;
            pointer-events: none;
            animation: glow-pulse 6s ease-in-out infinite;
        }

        @keyframes glow-pulse {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.05, 1.1); }
        }

        .crate-card { 
            background: rgba(8, 8, 8, 0.7); backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            width: 100%; max-width: 260px;
        }
        
        .qty-btn { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); cursor: pointer; color: #71717a; }
        .qty-btn.active { background: #06b6d4; color: #000; border-color: #06b6d4; }

        /* MODAL STYLING */
        #modal-overlay { backdrop-filter: blur(12px); display: none; background: rgba(0,0,0,0.85); z-index: 100; }
        .modal-content { 
            background: #0a0a0a; 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            width: 90%; max-width: 360px;
            padding: 1.25rem !important;
            border-radius: 24px;
        }

        .item-box {
            background: rgba(255, 255, 255, 0.015);
            border: 1px solid rgba(255, 255, 255, 0.03);
            padding: 6px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 10px;
            margin-bottom: 4px;
        }

        .chest-footer-img {
            width: 100%;
            margin-top: 12px;
            border-radius: 12px;
            image-rendering: pixelated;
            opacity: 0.8;
        }

        .cart-active { transform: translateX(0) !important; }
    </style>
</head>
<body>
    <div class="bg-grid"></div>

    <nav class="fixed top-0 w-full z-40 bg-black/60 border-b border-white/5 backdrop-blur-xl">
        <div class="max-w-7xl mx-auto flex justify-between items-center p-5">
            <div class="w-1/3"></div>
            
            <div class="w-1/3 flex justify-center">
                <div class="title-container">
                    <div class="matched-glow"></div>
                    <a href="index.html" class="text-xl font-black italic text-cyan-500 tracking-tighter uppercase relative z-10">
                        ECHODUPE<span class="text-white">LS</span>
                    </a>
                </div>
            </div>

            <div class="w-1/3 flex justify-end">
                <button onclick="toggleCart()" class="bg-white/5 border border-white/10 px-5 py-2 rounded-lg font-black text-[10px] hover:bg-cyan-500 hover:text-black transition-all tracking-widest uppercase">
                    Cart <span id="cart-count" class="ml-2 text-cyan-500 group-hover:text-black">0</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto pt-40 pb-24 px-6">
        <div class="text-center mb-16">
            <div class="title-container mb-6">
                <div class="matched-glow"></div>
                <h1 class="text-6xl font-black italic uppercase tracking-tight flex gap-6 justify-center relative z-10">
                    <span class="text-white">CRATE</span>
                    <span class="text-cyan-500">KEYS</span>
                </h1>
            </div>
            <p class="text-[10px] font-bold uppercase tracking-[0.4em] text-zinc-500 animate-pulse">Select a key to view contents</p>
        </div>

        <div id="crate-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8 justify-items-center"></div>
    </main>

    <div id="modal-overlay" class="fixed inset-0 flex items-center justify-center p-4" onclick="if(event.target === this) closeModal()">
        <div class="modal-content">
            <div class="flex justify-between items-center mb-4 px-1">
                <h2 id="modal-title" class="text-lg font-black italic text-white uppercase tracking-tighter"></h2>
                <button onclick="closeModal()" class="text-zinc-700 hover:text-white transition">&times;</button>
            </div>

            <div id="modal-list" class="flex flex-col max-h-[280px] overflow-y-auto pr-1">
                </div>

            <img src="assets/ChestGUI.png" class="chest-footer-img" alt="GUI Footer">
        </div>
    </div>

    <div id="cart-sidebar" class="fixed top-0 right-0 h-full w-full md:w-[400px] bg-black z-50 p-10 transform translate-x-full transition-transform duration-300 border-l border-white/5 flex flex-col">
        <div class="flex justify-between items-center mb-10 text-white">
            <h3 class="text-2xl font-black uppercase italic tracking-tighter">Your <span class="text-cyan-500">Cart</span></h3>
            <button onclick="toggleCart()" class="text-2xl">&times;</button>
        </div>
        <div id="cart-items" class="flex-grow overflow-y-auto space-y-3 mb-8"></div>
        <div class="border-t border-white/5 pt-8 mt-auto">
            <div class="flex justify-between items-end mb-6">
                <span class="text-zinc-500 font-bold uppercase text-[10px] tracking-widest">Subtotal</span>
                <span id="cart-total" class="text-3xl font-black text-white">$0.00</span>
            </div>
            <button class="w-full bg-cyan-600 text-black py-5 rounded-xl font-black uppercase text-xs tracking-[0.2em] hover:bg-white transition-all">Checkout</button>
        </div>
    </div>

    <footer class="w-full py-12 text-center border-t border-white/5">
        <p class="text-[8px] font-black uppercase tracking-[0.5em] text-zinc-700">Created by <span class="text-cyan-500/50">Skitxoe</span></p>
    </footer>

    <script type="module">
        const keyData = [
            { id: 'key_sculk', name: 'Sculk Key', price: 1.00, iconColor: '#10b981', contents: [
                { name: 'Enchanted Netherite Helmet', detail: 'P1 | U1' }, 
                { name: 'Enchanted Netherite Chestplate', detail: 'P1 | U1' }, 
                { name: 'Enchanted Netherite Leggings', detail: 'P1 | U1' },
                { name: 'Enchanted Netherite Boots', detail: 'P1 | U1' }, 
                { name: 'Enchanted Netherite Sword', detail: 'S1 | U1' }, 
                { name: 'Enchanted Netherite Axe', detail: 'S1 | U1' }, 
                { name: 'Enchanted Netherite Pickaxe', detail: 'E1 | U1' }
            ]},
            { id: 'key_shrieker', name: 'Shrieker Key', price: 2.00, iconColor: '#bae6fd', contents: [{ name: 'Coming Soon', detail: '...' }] },
            { id: 'key_warden', name: 'Warden Key', price: 3.00, iconColor: '#2563eb', contents: [{ name: 'Coming Soon', detail: '...' }] },
            { id: 'key_echo', name: 'Echo Key', price: 4.00, iconColor: '#22d3ee', contents: [{ name: 'Coming Soon', detail: '...' }] }
        ];

        let cart = JSON.parse(localStorage.getItem('echo_cart')) || {};
        const DISCOUNT_RATE = 0.1424;

        const grid = document.getElementById('crate-grid');
        keyData.forEach(item => {
            const card = document.createElement('div');
            card.className = "crate-card p-6 rounded-[28px] flex flex-col text-center items-center shadow-2xl hover:translate-y-[-4px] transition-all duration-300";
            card.dataset.selectedQty = 1;
            card.innerHTML = `
                <div class="mb-5" onclick="openModal('${item.id}')" style="color: ${item.iconColor}; cursor: pointer;">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M15 6C15 7.65685 13.6569 9 12 9C10.3431 9 9 7.65685 9 6C9 4.34315 10.3431 3 12 3C13.6569 3 15 4.34315 15 6Z" stroke="currentColor" stroke-width="2"/><path d="M12 9V21M12 21L14 19M12 21L10 19M12 15H15M12 12H15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                </div>
                <h3 class="text-sm font-black uppercase italic text-white tracking-wide">${item.name}</h3>
                <div class="mt-1 mb-4 flex flex-col h-10 items-center justify-center">
                    <span id="old-price-${item.id}" class="text-[9px] text-red-500 font-bold line-through opacity-0 leading-none mb-1">$0.00</span>
                    <span id="price-display-${item.id}" class="text-2xl font-black text-cyan-500">$${item.price.toFixed(2)}</span>
                </div>
                <div class="flex gap-1 mb-5">${[1, 5, 10, 20].map(amt => `<button onclick="updateQty('${item.id}', ${amt}, ${item.price})" id="btn-${item.id}-${amt}" class="qty-btn ${amt === 1 ? 'active' : ''} px-2.5 py-1 rounded-md text-[9px] font-black uppercase transition-all">${amt}x</button>`).join('')}</div>
                <button onclick='handleAddToCart("${item.id}")' class="w-full bg-white/5 border border-white/5 text-white py-3 rounded-xl font-black text-[10px] uppercase tracking-widest hover:bg-cyan-500 hover:text-black transition-all">Add to Cart</button>`;
            grid.appendChild(card);
        });

        window.openModal = (itemId) => {
            const item = keyData.find(k => k.id === itemId);
            document.getElementById('modal-title').innerText = item.name;
            const listContainer = document.getElementById('modal-list');
            listContainer.innerHTML = item.contents.map(c => `
                <div class="item-box">
                    <div class="text-left">
                        <p class="text-white text-[7.5px] font-bold uppercase leading-tight">${c.name}</p>
                        <p class="text-zinc-600 text-[6.5px] font-bold uppercase tracking-tighter">${c.detail}</p>
                    </div>
                </div>`).join('');
            document.getElementById('modal-overlay').style.display = 'flex';
        };

        window.closeModal = () => { document.getElementById('modal-overlay').style.display = 'none'; };

        window.updateQty = (itemId, qty, basePrice) => {
            const card = document.getElementById(`price-display-${itemId}`).closest('.crate-card');
            card.dataset.selectedQty = qty;
            card.querySelectorAll('.qty-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${itemId}-${qty}`).classList.add('active');
            const oldPriceEl = document.getElementById(`old-price-${itemId}`);
            const newPriceEl = document.getElementById(`price-display-${itemId}`);
            let total = basePrice * qty;
            if (qty >= 5) {
                oldPriceEl.innerText = `$${total.toFixed(2)}`;
                oldPriceEl.classList.remove('opacity-0');
                newPriceEl.innerText = `$${(total * (1 - DISCOUNT_RATE)).toFixed(2)}`;
            } else {
                oldPriceEl.classList.add('opacity-0');
                newPriceEl.innerText = `$${total.toFixed(2)}`;
            }
        };

        window.handleAddToCart = (itemId) => {
            const item = keyData.find(k => k.id === itemId);
            const card = document.getElementById(`price-display-${itemId}`).closest('.crate-card');
            const qty = parseInt(card.dataset.selectedQty);
            if (cart[item.id]) { cart[item.id].totalQty += qty; } 
            else { cart[item.id] = { ...item, totalQty: qty }; }
            updateCartUI();
        };

        window.toggleCart = () => { document.getElementById('cart-sidebar').classList.toggle('cart-active'); updateCartUI(); };
        window.removeFromCart = (id) => { delete cart[id]; updateCartUI(); };

        function updateCartUI() {
            const list = document.getElementById('cart-items');
            const totalDisplay = document.getElementById('cart-total');
            const countDisplay = document.getElementById('cart-count');
            let grandTotal = 0, totalItems = 0;
            list.innerHTML = Object.keys(cart).length > 0 ? '' : '<p class="text-zinc-900 text-center py-20 font-black uppercase text-[10px] tracking-widest">Empty</p>';
            Object.keys(cart).forEach(id => {
                const entry = cart[id];
                let price = entry.price * entry.totalQty;
                if (entry.totalQty >= 5) price *= (1 - DISCOUNT_RATE);
                grandTotal += price;
                totalItems += entry.totalQty;
                list.innerHTML += `<div class="bg-white/5 p-4 rounded-2xl border border-white/5 flex justify-between items-center mb-3">
                    <div><p class="font-black uppercase text-[10px] text-white tracking-wide">${entry.name}</p>
                    <p class="text-cyan-500 text-[8px] font-black uppercase">QTY: ${entry.totalQty} | $${price.toFixed(2)}</p></div>
                    <button onclick="removeFromCart('${id}')" class="text-red-500/50 text-[8px] font-black uppercase hover:text-red-500 transition">Remove</button></div>`;
            });
            totalDisplay.innerText = `$${grandTotal.toFixed(2)}`;
            countDisplay.innerText = totalItems;
            localStorage.setItem('echo_cart', JSON.stringify(cart));
        }
        updateCartUI();
    </script>
</body>
</html>
