<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EchoDupe | Keys</title>
    <link rel="icon" type="image/png" href="assets/logo.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        .bg-grid {
            background-size: 50px 50px;
            background-image: linear-gradient(to right, rgba(6, 182, 212, 0.05) 1px, transparent 1px), 
                              linear-gradient(to bottom, rgba(6, 182, 212, 0.05) 1px, transparent 1px);
            position: fixed; inset: 0; z-index: -1;
        }

        /* Branding */
        .logo-link { transition: color 0.2s; }
        .logo-link:hover { color: #06b6d4; }

        /* Crate Cards */
        .crate-card { 
            background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(20px); 
            border: 1px solid rgba(6, 182, 212, 0.1); 
            width: 100%; max-width: 280px;
        }
        
        .qty-btn { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); cursor: pointer; }
        .qty-btn.active { background: #06b6d4; color: #000; border-color: #06b6d4; }

        /* Modern Modal Styling */
        #modal-overlay { backdrop-filter: blur(12px); display: none; background: rgba(0,0,0,0.85); z-index: 100; }
        
        .modal-content { 
            background: #0a0a0a; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            width: 95%; max-width: 420px;
            padding: 1.5rem !important;
            border-radius: 24px;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .item-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 12px;
            margin-bottom: 8px;
        }

        .chest-footer-img {
            width: 100%;
            margin-top: 15px;
            border-radius: 12px;
            image-rendering: pixelated;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .cart-active { transform: translateX(0) !important; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="bg-grid"></div>

    <nav class="fixed top-0 w-full z-40 bg-black/80 border-b border-cyan-500/10 backdrop-blur-xl">
        <div class="max-w-7xl mx-auto grid grid-cols-3 items-center p-6">
            <div></div>
            <div class="flex justify-center">
                <a href="index.html" class="logo-link text-2xl font-black italic text-cyan-500 tracking-tighter uppercase">
                    ECHODUPE<span class="text-white">LS</span>
                </a>
            </div>
            <div class="flex justify-end">
                <button onclick="toggleCart()" class="bg-cyan-500/10 border border-cyan-500/20 px-6 py-2.5 rounded-xl font-black text-xs hover:bg-cyan-500 hover:text-black transition-all">
                    CART <span id="cart-count" class="ml-2 bg-cyan-500 text-black px-2 py-0.5 rounded text-[10px]">0</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto pt-44 pb-12 px-6">
        <div id="crate-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 justify-items-center"></div>
    </main>

    <div id="modal-overlay" class="fixed inset-0 flex items-center justify-center p-4" onclick="if(event.target === this) closeModal()">
        <div class="modal-content">
            <div class="flex justify-between items-start mb-4">
                <div>
                    <h2 id="modal-title" class="text-xl font-black italic text-white uppercase tracking-tighter"></h2>
                    <p class="text-emerald-500 text-[9px] font-black tracking-widest uppercase mt-1">Select (1) Reward on Unlock</p>
                </div>
                <button onclick="closeModal()" class="text-zinc-600 hover:text-white text-2xl">&times;</button>
            </div>

            <div id="modal-list" class="flex flex-col max-h-[350px] overflow-y-auto pr-1">
                </div>

            <img src="assets/ChestGUI.png" class="chest-footer-img" alt="GUI Footer">

            <div class="mt-4 text-center">
                <p class="text-red-500 text-[8px] font-black uppercase tracking-tighter">Items are non-dupeable in-game</p>
            </div>
        </div>
    </div>

    <div id="cart-sidebar" class="fixed top-0 right-0 h-full w-full md:w-[450px] bg-black z-50 p-12 transform translate-x-full transition-transform duration-300 border-l border-cyan-500/20 flex flex-col">
        <div class="flex justify-between items-center mb-12 text-white">
            <h3 class="text-3xl font-black uppercase italic tracking-tighter">Your <span class="text-cyan-500">Cart</span></h3>
            <button onclick="toggleCart()" class="text-3xl">&times;</button>
        </div>
        <div id="cart-items" class="flex-grow overflow-y-auto space-y-4 mb-8"></div>
        <div class="border-t border-cyan-500/10 pt-10 mt-auto">
            <div class="flex justify-between items-end mb-8">
                <span class="text-zinc-500 font-bold uppercase text-xs">Total</span>
                <span id="cart-total" class="text-4xl font-black text-white">$0.00</span>
            </div>
            <button class="w-full bg-cyan-600 text-black py-6 rounded-2xl font-black uppercase tracking-widest hover:bg-white transition-all">Proceed to Checkout</button>
        </div>
    </div>

    <script type="module">
        const keyData = [
            { id: 'key_sculk', name: 'Sculk Key', price: 1.00, iconColor: '#10b981', contents: [
                { name: 'Enchanted Netherite Helmet', detail: 'P1 | U1' }, 
                { name: 'Enchanted Netherite Chestplate', detail: 'P1 | U1' }, 
                { name: 'Enchanted Netherite Leggings', detail: 'P1 | U1' },
                { name: 'Enchanted Netherite Boots', detail: 'P1 | U1' }, 
                { name: 'Enchanted Netherite Sword', detail: 'S1 | U1' }, 
                { name: 'Enchanted Netherite Axe', detail: 'S1 | U1' }, 
                { name: 'Enchanted Netherite Pickaxe', detail: 'E1 | U1' }
            ]},
            { id: 'key_shrieker', name: 'Shrieker Key', price: 2.00, iconColor: '#bae6fd', contents: [{ name: 'Coming Soon', detail: '...' }] },
            { id: 'key_warden', name: 'Warden Key', price: 3.00, iconColor: '#2563eb', contents: [{ name: 'Coming Soon', detail: '...' }] },
            { id: 'key_echo', name: 'Echo Key', price: 4.00, iconColor: '#22d3ee', contents: [{ name: 'Coming Soon', detail: '...' }] }
        ];

        let cart = JSON.parse(localStorage.getItem('echo_cart')) || {};
        const DISCOUNT_RATE = 0.1424;

        const grid = document.getElementById('crate-grid');
        keyData.forEach(item => {
            const card = document.createElement('div');
            card.className = "crate-card p-8 rounded-[35px] flex flex-col text-center items-center shadow-xl hover:translate-y-[-5px] transition-transform";
            card.dataset.selectedQty = 1;
            card.innerHTML = `
                <div class="mb-6" onclick="openModal('${item.id}')" style="color: ${item.iconColor}; cursor: pointer;">
                    <svg width="56" height="56" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M15 6C15 7.65685 13.6569 9 12 9C10.3431 9 9 7.65685 9 6C9 4.34315 10.3431 3 12 3C13.6569 3 15 4.34315 15 6Z" stroke="currentColor" stroke-width="2.5"/><path d="M12 9V21M12 21L14 19M12 21L10 19M12 15H15M12 12H15" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>
                </div>
                <h3 class="text-lg font-black uppercase italic text-white">${item.name}</h3>
                <div class="mt-1 mb-4 flex flex-col h-10 items-center">
                    <span id="old-price-${item.id}" class="text-[10px] text-red-500 font-bold line-through opacity-0">$0.00</span>
                    <span id="price-display-${item.id}" class="text-3xl font-black text-cyan-500">$${item.price.toFixed(2)}</span>
                </div>
                <div class="flex gap-1 mb-6">${[1, 5, 10, 20].map(amt => `<button onclick="updateQty('${item.id}', ${amt}, ${item.price})" id="btn-${item.id}-${amt}" class="qty-btn ${amt === 1 ? 'active' : ''} px-3 py-1.5 rounded-lg text-[10px] font-black uppercase transition-all">${amt}x</button>`).join('')}</div>
                <button onclick='handleAddToCart("${item.id}")' class="w-full bg-cyan-500 text-black py-4 rounded-xl font-black uppercase hover:bg-white transition-all">Add to Cart</button>`;
            grid.appendChild(card);
        });

        window.openModal = (itemId) => {
            const item = keyData.find(k => k.id === itemId);
            document.getElementById('modal-title').innerText = item.name;
            const listContainer = document.getElementById('modal-list');
            listContainer.innerHTML = item.contents.map(c => `
                <div class="item-box">
                    <div class="text-left">
                        <p class="text-white text-[10px] font-black uppercase leading-none mb-1">${c.name}</p>
                        <p class="text-zinc-500 text-[8px] font-bold uppercase">${c.detail}</p>
                    </div>
                    <div class="w-2 h-2 rounded-full bg-emerald-500/20 border border-emerald-500/40"></div>
                </div>`).join('');
            document.getElementById('modal-overlay').style.display = 'flex';
        };

        window.closeModal = () => { document.getElementById('modal-overlay').style.display = 'none'; };

        window.updateQty = (itemId, qty, basePrice) => {
            const card = document.getElementById(`price-display-${itemId}`).closest('.crate-card');
            card.dataset.selectedQty = qty;
            card.querySelectorAll('.qty-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${itemId}-${qty}`).classList.add('active');
            
            const oldPriceEl = document.getElementById(`old-price-${itemId}`);
            const newPriceEl = document.getElementById(`price-display-${itemId}`);
            let total = basePrice * qty;
            
            if (qty >= 5) {
                oldPriceEl.innerText = `$${total.toFixed(2)}`;
                oldPriceEl.classList.remove('opacity-0');
                newPriceEl.innerText = `$${(total * (1 - DISCOUNT_RATE)).toFixed(2)}`;
            } else {
                oldPriceEl.classList.add('opacity-0');
                newPriceEl.innerText = `$${total.toFixed(2)}`;
            }
        };

        window.handleAddToCart = (itemId) => {
            const item = keyData.find(k => k.id === itemId);
            const card = document.getElementById(`price-display-${itemId}`).closest('.crate-card');
            const qty = parseInt(card.dataset.selectedQty);
            if (cart[item.id]) { cart[item.id].totalQty += qty; } 
            else { cart[item.id] = { ...item, totalQty: qty }; }
            updateCartUI();
        };

        window.toggleCart = () => { document.getElementById('cart-sidebar').classList.toggle('cart-active'); updateCartUI(); };
        window.removeFromCart = (id) => { delete cart[id]; updateCartUI(); };

        function updateCartUI() {
            const list = document.getElementById('cart-items');
            const totalDisplay = document.getElementById('cart-total');
            const countDisplay = document.getElementById('cart-count');
            let grandTotal = 0, totalItems = 0;
            list.innerHTML = Object.keys(cart).length > 0 ? '' : '<p class="text-zinc-800 text-center py-20 font-black uppercase text-xs">Empty</p>';
            
            Object.keys(cart).forEach(id => {
                const entry = cart[id];
                let price = entry.price * entry.totalQty;
                if (entry.totalQty >= 5) price *= (1 - DISCOUNT_RATE);
                grandTotal += price;
                totalItems += entry.totalQty;
                list.innerHTML += `<div class="bg-zinc-900/50 p-6 rounded-3xl border border-cyan-500/10 flex justify-between items-center mb-4">
                    <div><p class="font-black uppercase text-sm text-white">${entry.name}</p>
                    <p class="text-cyan-500 text-[9px] font-black uppercase">QTY: ${entry.totalQty} | $${price.toFixed(2)}</p></div>
                    <button onclick="removeFromCart('${id}')" class="text-red-500 text-[9px] font-black uppercase hover:text-white transition">Remove</button></div>`;
            });
            totalDisplay.innerText = `$${grandTotal.toFixed(2)}`;
            countDisplay.innerText = totalItems;
            localStorage.setItem('echo_cart', JSON.stringify(cart));
        }
        updateCartUI();
    </script>
</body>
</html>
