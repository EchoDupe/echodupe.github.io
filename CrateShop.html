<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EchoDupe | Keys</title>
    <link rel="icon" type="image/png" href="assets/logo.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        .bg-grid {
            background-size: 50px 50px;
            background-image: linear-gradient(to right, rgba(6, 182, 212, 0.05) 1px, transparent 1px), 
                              linear-gradient(to bottom, rgba(6, 182, 212, 0.05) 1px, transparent 1px);
            position: fixed; inset: 0; z-index: -1;
        }

        .title-container { position: relative; display: inline-block; isolation: isolate; }
        .matched-glow {
            position: absolute; inset: -15px -30%; 
            background: linear-gradient(to right, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.35) 35%, rgba(130, 235, 255, 0.5) 50%, rgba(6, 182, 212, 0.35) 65%, rgba(6, 182, 212, 0) 100%);
            filter: blur(50px); mix-blend-mode: screen; z-index: -1; pointer-events: none;
            animation: glow-pulse 6s ease-in-out infinite;
        }

        @keyframes glow-pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.1, 1.15); }
        }

        .crate-card { 
            background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(20px); 
            border: 1px solid rgba(6, 182, 212, 0.1); 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 100%; max-width: 280px;
        }
        .crate-card:hover { transform: translateY(-10px); border-color: #06b6d4; box-shadow: 0 10px 40px rgba(6, 182, 212, 0.1); }
        
        .qty-btn { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.2s ease; cursor: pointer; }
        .qty-btn.active { background: #06b6d4; color: #000; border-color: #06b6d4; }

        .cart-active { transform: translateX(0) !important; }
        
        /* Modal Styles */
        #modal-overlay { backdrop-filter: blur(12px); display: none; background: rgba(0,0,0,0.75); }
        .modal-content { background: #0a0a0a; border: 1px solid rgba(6, 182, 212, 0.2); box-shadow: 0 0 50px rgba(0,0,0,1); }

        .key-icon-container { position: relative; cursor: pointer; transition: transform 0.3s ease; }
        .key-icon-container:hover { transform: scale(1.1); }
        .key-tooltip {
            position: absolute; top: -35px; left: 50%; transform: translateX(-50%);
            background: #fff; color: #000; font-size: 9px; font-weight: 900;
            padding: 5px 10px; border-radius: 5px; white-space: nowrap;
            opacity: 0; transition: all 0.3s; pointer-events: none; text-transform: uppercase;
        }
        .key-icon-container:hover .key-tooltip { opacity: 1; top: -45px; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #1a1a1a; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #06b6d4; }
    </style>
</head>
<body>
    <div class="bg-grid"></div>

    <nav class="fixed top-0 w-full z-40 bg-black/80 border-b border-cyan-500/10 backdrop-blur-xl">
        <div class="max-w-7xl mx-auto flex justify-between items-center p-6">
            <a href="index.html" class="text-2xl font-black italic text-cyan-500 tracking-tighter uppercase">ECHODUPE<span class="text-white">LS</span></a>
            <div class="flex items-center gap-6">
                <a href="index.html" class="text-[10px] font-black uppercase tracking-[0.3em] text-zinc-500 hover:text-cyan-400 transition">← Hub</a>
                <button onclick="toggleCart()" class="relative group bg-cyan-500/10 border border-cyan-500/20 px-6 py-2.5 rounded-xl font-black text-xs transition-all hover:bg-cyan-500 hover:text-black">
                    CART <span id="cart-count" class="ml-2 bg-cyan-500 text-black px-2 py-0.5 rounded text-[10px]">0</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto pt-44 pb-12 px-6">
        <div class="text-center mb-16">
            <div class="title-container mb-8">
                <div class="matched-glow"></div>
                <h1 class="text-7xl font-black italic uppercase tracking-tighter flex gap-8 justify-center">
                    <span class="crate-text">CRATE</span>
                    <span class="keys-text">KEYS</span>
                </h1>
            </div>
            
            <div class="flex flex-col items-center gap-2">
                <div class="h-[1px] w-12 bg-cyan-500/50 mb-2"></div>
                <p class="text-[11px] font-black uppercase tracking-[0.5em] text-cyan-400/80 animate-pulse">
                    Click the Keys to view Contents
                </p>
                <div class="h-[1px] w-12 bg-cyan-500/50 mt-2"></div>
            </div>
        </div>

        <div id="crate-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 justify-items-center"></div>
    </main>

    <div id="modal-overlay" class="fixed inset-0 z-50 flex items-center justify-center p-4" onclick="if(event.target === this) closeModal()">
        <div class="modal-content w-full max-w-lg rounded-[40px] p-8 relative overflow-hidden flex flex-col max-h-[90vh]">
            <div class="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-cyan-500 to-blue-600"></div>
            
            <div class="flex justify-between items-start mb-6">
                <div>
                    <h2 id="modal-title" class="text-3xl font-black italic text-white uppercase tracking-tighter leading-none">Crate Contents</h2>
                    <p class="text-cyan-500 text-[9px] font-black tracking-[0.4em] mt-2 uppercase">Official Loot Table</p>
                </div>
                <button onclick="closeModal()" class="bg-white/5 hover:bg-red-500/20 hover:text-red-500 w-10 h-10 rounded-full flex items-center justify-center transition-all text-zinc-500">&times;</button>
            </div>

            <div id="modal-list" class="flex-grow overflow-y-auto space-y-2 pr-2 mb-6">
                </div>

            <div id="modal-image-container" class="mb-6 rounded-2xl overflow-hidden border border-white/5 bg-black/40">
                </div>

            <div class="bg-red-500/10 border border-red-500/20 p-4 rounded-2xl">
                <p class="text-red-500 text-[10px] font-black text-center uppercase tracking-[0.2em] leading-relaxed">
                    NONE OF THESE ITEMS WILL BE DUPEABLE IN GAME
                </p>
            </div>
        </div>
    </div>

    <div id="cart-sidebar" class="fixed top-0 right-0 h-full w-full md:w-[450px] bg-black z-50 p-12 transform translate-x-full transition-transform duration-500 border-l border-cyan-500/20 flex flex-col">
        <div class="flex justify-between items-center mb-12 text-white">
            <h3 class="text-3xl font-black uppercase italic tracking-tighter">Your <span class="text-cyan-500">Cart</span></h3>
            <button onclick="toggleCart()" class="text-3xl">&times;</button>
        </div>
        <div id="cart-items" class="flex-grow overflow-y-auto space-y-4 mb-8"></div>
        <div class="border-t border-cyan-500/10 pt-10 mt-auto">
            <div class="flex justify-between items-end mb-8">
                <span class="text-zinc-500 font-bold uppercase text-xs">Total</span>
                <span id="cart-total" class="text-4xl font-black text-white">$0.00</span>
            </div>
            <button class="block text-center w-full bg-cyan-600 text-black py-6 rounded-2xl font-black uppercase tracking-widest hover:bg-white transition-all shadow-lg">Proceed to Checkout</button>
        </div>
    </div>

    <script type="module">
        const keyData = [
            { 
                id: 'key_sculk', 
                name: 'Sculk Key', 
                price: 1.00, 
                iconColor: '#10b981', 
                description: 'UNLOCK THE SCULK SUPPLY CRATE',
                image: 'assets/placeholder.png', 
                contents: [
                    { name: 'Enchanted Netherite Helmet', detail: 'P1 | U1 | Trim: Emerald Wild', rarity: 'EPIC' },
                    { name: 'Enchanted Netherite Chestplate', detail: 'P1 | U1 | Trim: Emerald Wild', rarity: 'EPIC' },
                    { name: 'Enchanted Netherite Leggings', detail: 'P1 | U1 | Trim: Emerald Wild', rarity: 'EPIC' },
                    { name: 'Enchanted Netherite Boots', detail: 'P1 | U1 | Trim: Emerald Wild', rarity: 'EPIC' },
                    { name: 'Enchanted Netherite Sword', detail: 'S1 | U1', rarity: 'LEGENDARY' },
                    { name: 'Enchanted Netherite Axe', detail: 'S1 | U1', rarity: 'LEGENDARY' },
                    { name: 'Enchanted Netherite Pickaxe', detail: 'E1 | U1', rarity: 'RARE' }
                ]
            },
            { 
                id: 'key_shrieker', 
                name: 'Shrieker Key', 
                price: 2.00, 
                iconColor: '#bae6fd', 
                description: 'UNLOCK THE SHRIEKER SUPPLY CRATE',
                contents: [{ name: 'Coming Soon', detail: 'Loot table being finalized', rarity: '???' }]
            },
            { 
                id: 'key_warden', 
                name: 'Warden Key', 
                price: 3.00, 
                iconColor: '#2563eb', 
                description: 'UNLOCK THE WARDEN SUPPLY CRATE',
                contents: [{ name: 'Coming Soon', detail: 'Loot table being finalized', rarity: '???' }]
            },
            { 
                id: 'key_echo', 
                name: 'Echo Key', 
                price: 4.00, 
                iconColor: '#22d3ee', 
                description: 'UNLOCK THE ELITE ECHO CRATE',
                contents: [{ name: 'Coming Soon', detail: 'Loot table being finalized', rarity: '???' }]
            }
        ];

        const DISCOUNT_RATE = 0.1424; 
        let cart = JSON.parse(localStorage.getItem('echo_cart')) || {};

        const grid = document.getElementById('crate-grid');
        
        keyData.forEach(item => {
            const card = document.createElement('div');
            card.className = "crate-card p-8 rounded-[35px] flex flex-col text-center items-center shadow-2xl";
            card.dataset.selectedQty = 1;

            card.innerHTML = `
                <div class="key-icon-container mb-6" onclick="openModal('${item.id}')" style="color: ${item.iconColor}; filter: drop-shadow(0 0 12px ${item.iconColor}aa)">
                    <div class="key-tooltip">Click to view contents</div>
                    <svg width="56" height="56" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M15 6C15 7.65685 13.6569 9 12 9C10.3431 9 9 7.65685 9 6C9 4.34315 10.3431 3 12 3C13.6569 3 15 4.34315 15 6Z" stroke="currentColor" stroke-width="2.5"/>
                        <path d="M12 9V21M12 21L14 19M12 21L10 19M12 15H15M12 12H15" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                    </svg>
                </div>
                <h3 class="text-lg font-black uppercase italic text-white tracking-tight">${item.name}</h3>
                <div id="price-display-${item.id}" class="text-3xl font-black mt-1 mb-4 text-cyan-500">$${item.price.toFixed(2)}</div>
                
                <div class="flex gap-1 mb-6">
                    ${[1, 5, 10, 20].map(amt => `
                        <button onclick="updateQty('${item.id}', ${amt}, ${item.price})" id="btn-${item.id}-${amt}" class="qty-btn ${amt === 1 ? 'active' : ''} px-3 py-1.5 rounded-lg text-[10px] font-black uppercase transition-all">
                            ${amt}x
                        </button>
                    `).join('')}
                </div>

                <p class="text-zinc-500 text-[8px] font-bold uppercase mb-6 tracking-widest h-8">${item.description}</p>
                <button onclick='handleAddToCart("${item.id}")' class="w-full bg-cyan-500 text-black py-4 rounded-xl font-black uppercase hover:bg-white transition-all shadow-lg shadow-cyan-500/20">Add to Cart</button>`;
            
            grid.appendChild(card);
        });

        window.openModal = (itemId) => {
            const item = keyData.find(k => k.id === itemId);
            document.getElementById('modal-title').innerText = item.name;
            const listContainer = document.getElementById('modal-list');
            
            listContainer.innerHTML = item.contents.map(c => `
                <div class="bg-white/5 border border-white/5 p-4 rounded-2xl flex items-center justify-between group hover:border-cyan-500/30 transition-all">
                    <div>
                        <p class="text-white text-[10px] font-black uppercase tracking-tight">${c.name}</p>
                        <p class="text-zinc-500 text-[8px] font-bold uppercase">${c.detail}</p>
                    </div>
                    <span class="text-[8px] font-black px-2 py-1 rounded bg-black/40 border border-white/10 text-cyan-400">${c.rarity}</span>
                </div>
            `).join('');

            const imgContainer = document.getElementById('modal-image-container');
            if(item.image) {
                imgContainer.innerHTML = `<img src="${item.image}" class="w-full h-auto object-cover opacity-90">`;
                imgContainer.style.display = 'block';
            } else {
                imgContainer.style.display = 'none';
            }

            document.getElementById('modal-overlay').style.display = 'flex';
        };

        window.closeModal = () => { document.getElementById('modal-overlay').style.display = 'none'; };

        window.updateQty = (itemId, qty, basePrice) => {
            const container = document.getElementById(`price-display-${itemId}`).closest('.crate-card');
            container.dataset.selectedQty = qty;
            container.querySelectorAll('.qty-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${itemId}-${qty}`).classList.add('active');
            
            let total = basePrice * qty;
            if (qty > 1) total = total * (1 - DISCOUNT_RATE);
            document.getElementById(`price-display-${itemId}`).innerText = `$${total.toFixed(2)}`;
        };

        window.handleAddToCart = (itemId) => {
            const item = keyData.find(k => k.id === itemId);
            const card = document.getElementById(`price-display-${itemId}`).closest('.crate-card');
            const qty = parseInt(card.dataset.selectedQty);
            let finalPrice = item.price * qty;
            if (qty > 1) finalPrice = finalPrice * (1 - DISCOUNT_RATE);
            addToCart(item, qty, finalPrice);
        };

        window.toggleCart = () => { document.getElementById('cart-sidebar').classList.toggle('cart-active'); updateCartUI(); };
        
        window.addToCart = (item, qty, price) => { 
            const cartId = `${item.id}_x${qty}`;
            if (cart[cartId]) cart[cartId].cartQuantity += 1;
            else cart[cartId] = { ...item, displayName: `${item.name} (${qty}x)`, bundlePrice: price, cartQuantity: 1 }; 
            updateCartUI(); 
            document.getElementById('cart-sidebar').classList.add('cart-active');
        };

        window.removeFromCart = (id) => { delete cart[id]; updateCartUI(); };

        function updateCartUI() {
            const list = document.getElementById('cart-items');
            const totalDisplay = document.getElementById('cart-total');
            const countDisplay = document.getElementById('cart-count');
            const itemKeys = Object.keys(cart);
            let total = 0, totalItems = 0;

            list.innerHTML = itemKeys.length > 0 ? '' : '<p class="text-zinc-800 text-center py-20 font-black uppercase text-xs">Empty</p>';
            
            itemKeys.forEach(key => {
                const entry = cart[key];
                total += (entry.bundlePrice * entry.cartQuantity);
                totalItems += entry.cartQuantity;
                list.innerHTML += `
                    <div class="bg-zinc-900/50 p-6 rounded-3xl border border-cyan-500/10 flex justify-between items-center mb-4">
                        <div>
                            <p class="font-black uppercase text-sm text-white">${entry.displayName}</p>
                            <p class="text-cyan-500 text-[9px] font-black">QTY: ${entry.cartQuantity} | $${(entry.bundlePrice * entry.cartQuantity).toFixed(2)}</p>
                        </div>
                        <button onclick="removeFromCart('${key}')" class="text-red-500 text-[9px] font-black uppercase">Remove</button>
                    </div>`;
            });

            totalDisplay.innerText = `$${total.toFixed(2)}`;
            countDisplay.innerText = totalItems;
            localStorage.setItem('echo_cart', JSON.stringify(cart));
        }
        updateCartUI();
    </script>
</body>
</html>
