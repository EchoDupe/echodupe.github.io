<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EchoDupe | Keys</title>
    <link rel="icon" type="image/png" href="assets/logo.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        .bg-grid {
            background-size: 50px 50px;
            background-image: linear-gradient(to right, rgba(6, 182, 212, 0.05) 1px, transparent 1px), 
                              linear-gradient(to bottom, rgba(6, 182, 212, 0.05) 1px, transparent 1px);
            position: fixed; inset: 0; z-index: -1;
        }

        /* Heartbeat Animation - EXCLUSIVELY for the word "KEYS" */
        @keyframes title-heartbeat {
            0% { transform: scale(1); text-shadow: 0 0 10px rgba(6, 182, 212, 0.3); }
            15% { transform: scale(1.08); text-shadow: 0 0 30px rgba(6, 182, 212, 0.8); }
            30% { transform: scale(1); }
            45% { transform: scale(1.1); text-shadow: 0 0 40px rgba(6, 182, 212, 1); }
            100% { transform: scale(1); }
        }
        .animate-word { 
            display: inline-block;
            animation: title-heartbeat 2s infinite; 
            color: #06b6d4;
        }

        .crate-card { 
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(6, 182, 212, 0.1); 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 100%;
            max-width: 280px;
        }
        .crate-card:hover { 
            transform: translateY(-10px); 
            border-color: #06b6d4;
            box-shadow: 0 10px 40px rgba(6, 182, 212, 0.1);
        }
        
        .cart-active { transform: translateX(0) !important; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #06b6d4; border-radius: 10px; }
        .no-select { user-select: none; }

        /* Footer Hover */
        .dev-credit:hover { text-shadow: 0 0 10px #06b6d4; }
    </style>
</head>
<body>
    <div class="bg-grid"></div>

    <nav class="fixed top-0 w-full z-40 bg-black/80 border-b border-cyan-500/10 backdrop-blur-xl">
        <div class="max-w-7xl mx-auto flex justify-between items-center p-6">
            <a href="index.html" class="text-2xl font-black italic text-cyan-500 tracking-tighter uppercase">ECHODUPE<span class="text-white">LS</span></a>
            <div class="flex items-center gap-6">
                <a href="index.html" class="text-[10px] font-black uppercase tracking-[0.3em] text-zinc-500 hover:text-cyan-400 transition">← Hub</a>
                <button onclick="toggleCart()" class="relative group bg-cyan-500/10 border border-cyan-500/20 px-6 py-2.5 rounded-xl font-black text-xs transition-all hover:bg-cyan-500 hover:text-black">
                    CART <span id="cart-count" class="ml-2 bg-cyan-500 text-black px-2 py-0.5 rounded text-[10px]">0</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto pt-44 pb-12 px-6">
        <div class="text-center mb-24">
            <h1 class="text-7xl font-black italic uppercase tracking-tighter">
                CRATE <span class="animate-word">KEYS</span>
            </h1>
        </div>
        
        <div id="crate-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 justify-items-center">
            </div>
    </main>

    <footer id="main-footer" class="py-20 border-t border-cyan-500/10 mt-20 text-center no-select">
        <div class="max-w-7xl mx-auto px-6">
            <p class="text-[10px] font-black uppercase tracking-[0.4em] text-zinc-500 mb-2">
                &copy; 2026 EchoDupeLS. All Rights Reserved.
            </p>
            <p class="text-[10px] font-black uppercase tracking-[0.4em] text-zinc-600">
                Designed & Developed by <span class="text-cyan-500 dev-credit transition-all cursor-default">Skitxoe</span>
            </p>
        </div>
    </footer>

    <div id="cart-sidebar" class="fixed top-0 right-0 h-full w-full md:w-[450px] bg-black z-50 p-12 transform translate-x-full transition-transform duration-500 border-l border-cyan-500/20 flex flex-col">
        <div class="flex justify-between items-center mb-12 text-white">
            <h3 class="text-3xl font-black uppercase italic tracking-tighter">Your <span class="text-cyan-500">Cart</span></h3>
            <button onclick="toggleCart()" class="text-3xl">&times;</button>
        </div>
        <div id="cart-items" class="flex-grow overflow-y-auto space-y-4 mb-8"></div>
        <div class="border-t border-cyan-500/10 pt-10 mt-auto">
            <div class="flex justify-between items-end mb-8">
                <span class="text-zinc-500 font-bold uppercase text-xs">Total</span>
                <span id="cart-total" class="text-4xl font-black text-white">$0.00</span>
            </div>
            <button class="block text-center w-full bg-cyan-600 text-black py-6 rounded-2xl font-black uppercase tracking-widest hover:bg-white transition-all shadow-lg">Proceed to Checkout</button>
        </div>
    </div>

    <script type="module">
        const keyData = [
            { id: 'key_sculk', name: 'Sculk Key', price: 1.00, iconColor: '#10b981', description: 'UNLOCK THE SCULK SUPPLY CRATE' },
            { id: 'key_shrieker', name: 'Shrieker Key', price: 2.00, iconColor: '#bae6fd', description: 'UNLOCK THE SHRIEKER SUPPLY CRATE' },
            { id: 'key_warden', name: 'Warden Key', price: 3.00, iconColor: '#2563eb', description: 'UNLOCK THE WARDEN SUPPLY CRATE' },
            { id: 'key_echo', name: 'Echo Key', price: 4.00, iconColor: '#22d3ee', description: 'UNLOCK THE ELITE ECHO CRATE' }
        ];

        let cart = JSON.parse(localStorage.getItem('echo_cart')) || {};

        const grid = document.getElementById('crate-grid');
        keyData.forEach(item => {
            const card = document.createElement('div');
            card.className = "crate-card p-10 rounded-[35px] flex flex-col text-center items-center shadow-2xl";
            card.innerHTML = `
                <div class="mb-8" style="color: ${item.iconColor}; filter: drop-shadow(0 0 12px ${item.iconColor}aa)">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M15 6C15 7.65685 13.6569 9 12 9C10.3431 9 9 7.65685 9 6C9 4.34315 10.3431 3 12 3C13.6569 3 15 4.34315 15 6Z" stroke="currentColor" stroke-width="2.5"/>
                        <path d="M12 9V21M12 21L14 19M12 21L10 19M12 15H15M12 12H15" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                    </svg>
                </div>
                <h3 class="text-xl font-black uppercase italic text-white tracking-tight">${item.name}</h3>
                <div class="text-4xl font-black mt-2 mb-6 text-cyan-500">$${item.price.toFixed(2)}</div>
                <p class="text-zinc-500 text-[9px] font-bold uppercase mb-8 tracking-widest leading-relaxed">${item.description}</p>
                <button onclick='addToCart(${JSON.stringify(item)})' class="w-full bg-cyan-600 text-black py-4 rounded-xl font-black uppercase hover:bg-white transition-all shadow-lg shadow-cyan-500/20">Add to Cart</button>`;
            grid.appendChild(card);
        });

        window.toggleCart = () => { document.getElementById('cart-sidebar').classList.toggle('cart-active'); updateCartUI(); };
        
        window.addToCart = (item) => { 
            if (cart[item.id]) cart[item.id].quantity += 1; 
            else cart[item.id] = { ...item, quantity: 1 }; 
            updateCartUI(); 
            document.getElementById('cart-sidebar').classList.add('cart-active');
        };

        window.removeFromCart = (id) => { delete cart[id]; updateCartUI(); };

        function updateCartUI() {
            const list = document.getElementById('cart-items');
            const totalDisplay = document.getElementById('cart-total');
            const countDisplay = document.getElementById('cart-count');
            const itemIds = Object.keys(cart);
            let total = 0, qty = 0;

            list.innerHTML = itemIds.length > 0 ? '' : '<p class="text-zinc-800 text-center py-20 font-black uppercase text-xs">Empty</p>';
            
            itemIds.forEach(id => {
                const item = cart[id];
                total += (item.price * item.quantity);
                qty += item.quantity;
                list.innerHTML += `<div class="bg-zinc-900/50 p-6 rounded-3xl border border-cyan-500/10 flex justify-between items-center">
                    <div><p class="font-black uppercase text-sm text-white">${item.name}</p><p class="text-cyan-500 text-[9px] font-black">QTY: ${item.quantity}</p></div>
                    <button onclick="removeFromCart('${id}')" class="text-red-500 text-[9px] font-black uppercase">Remove</button></div>`;
            });

            totalDisplay.innerText = `$${total.toFixed(2)}`;
            countDisplay.innerText = qty;
            localStorage.setItem('echo_cart', JSON.stringify(cart));
        }
        updateCartUI();
    </script>
</body>
</html>
