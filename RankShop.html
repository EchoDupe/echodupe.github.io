<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EchoDupe | Ranks</title>
    <link rel="icon" type="image/png" href="assets/logo.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        .bg-grid {
            background-size: 50px 50px;
            background-image: linear-gradient(to right, rgba(6, 182, 212, 0.07) 1px, transparent 1px), 
                              linear-gradient(to bottom, rgba(6, 182, 212, 0.07) 1px, transparent 1px);
            position: fixed; inset: 0; z-index: -1;
        }
        .bg-glow {
            position: fixed; inset: 0;
            background: radial-gradient(circle at 50% -20%, rgba(6, 182, 212, 0.15) 0%, transparent 50%);
            z-index: -1; pointer-events: none;
        }

        /* Heartbeat Animation - Targeted at "RANKS" */
        @keyframes heart-throb {
            0% { transform: scale(1); text-shadow: 0 0 0px rgba(6, 182, 212, 0); }
            15% { transform: scale(1.08); text-shadow: 0 0 25px rgba(6, 182, 212, 0.5); }
            30% { transform: scale(1); }
            45% { transform: scale(1.12); text-shadow: 0 0 35px rgba(6, 182, 212, 0.7); }
            100% { transform: scale(1); }
        }
        .rank-pulse { 
            display: inline-block; 
            animation: heart-throb 1.8s infinite;
            color: #06b6d4; /* Ensuring the pulsed word is the accent color */
        }

        .rank-card { 
            background: rgba(5, 5, 5, 0.8); 
            backdrop-filter: blur(16px); 
            border: 1px solid rgba(6, 182, 212, 0.1); 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            width: 100%; 
            max-width: 380px;
            display: flex;
            flex-direction: column;
        }
        .rank-card:hover { transform: translateY(-12px); border-color: #06b6d4; box-shadow: 0 0 50px rgba(6, 182, 212, 0.2); }
        .cart-active { transform: translateX(0) !important; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #06b6d4; border-radius: 10px; }
        .no-select { user-select: none; }

        .mc-preview {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 14px;
            border-radius: 14px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        .perk-category {
            font-size: 9px;
            font-weight: 900;
            letter-spacing: 0.2em;
            color: #06b6d4;
            margin-top: 1.5rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-glow"></div>

    <nav class="fixed top-0 w-full z-40 bg-black/80 border-b border-cyan-500/10 backdrop-blur-xl">
        <div class="max-w-7xl mx-auto flex justify-between items-center p-6">
            <a href="index.html" class="text-2xl font-black italic text-cyan-500 tracking-tighter uppercase">ECHODUPE<span class="text-white">LS</span></a>
            <div class="flex items-center gap-6">
                <a href="index.html" class="text-[10px] font-black uppercase tracking-[0.3em] text-zinc-500 hover:text-cyan-400 transition">← Hub</a>
                <a href="staff.html" class="text-[10px] font-black uppercase tracking-widest text-zinc-400 hover:text-cyan-500 transition">Staff</a>
                <button onclick="toggleCart()" class="relative group bg-cyan-500/10 border border-cyan-500/20 px-6 py-2.5 rounded-xl font-black text-xs transition-all hover:bg-cyan-500 hover:text-black">
                    CART <span id="cart-count" class="ml-2 bg-cyan-500 text-black px-2 py-0.5 rounded text-[10px]">0</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto pt-44 pb-12 px-6">
        <div class="text-center mb-16">
            <h1 class="text-7xl font-black italic uppercase tracking-tighter">
                GLOBAL <span class="rank-pulse">RANKS</span>
            </h1>
        </div>

        <div class="max-w-4xl mx-auto mb-16">
            <div class="bg-cyan-500/5 border border-cyan-500/10 rounded-2xl p-6 backdrop-blur-md">
                <div class="flex flex-wrap justify-center gap-6 md:gap-12">
                    <div class="flex items-center gap-2">
                        <span class="text-cyan-500 font-black text-xs">P:</span>
                        <span class="text-zinc-400 text-[10px] font-black uppercase tracking-widest">Protection</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-cyan-500 font-black text-xs">U:</span>
                        <span class="text-zinc-400 text-[10px] font-black uppercase tracking-widest">Unbreaking</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-cyan-500 font-black text-xs">S:</span>
                        <span class="text-zinc-400 text-[10px] font-black uppercase tracking-widest">Sharpness</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-cyan-500 font-black text-xs">E:</span>
                        <span class="text-zinc-400 text-[10px] font-black uppercase tracking-widest">Efficiency</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-cyan-500 font-black text-xs">M:</span>
                        <span class="text-zinc-400 text-[10px] font-black uppercase tracking-widest">Mending</span>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="rank-grid" class="flex flex-wrap gap-10 justify-center items-stretch"></div>
    </main>

    <footer id="main-footer" class="py-20 border-t border-cyan-500/10 mt-20 text-center no-select">
        <div class="max-w-7xl mx-auto px-6">
            <p class="text-[10px] font-black uppercase tracking-[0.4em] text-zinc-500 mb-2">
                &copy; 2026 EchoDupeLS. All Rights Reserved.
            </p>
            <p class="text-[10px] font-black uppercase tracking-[0.4em] text-zinc-600">
                Designed & Developed by <span class="text-cyan-500">Skitxoe</span>
            </p>
        </div>
    </footer>

    <div id="cart-sidebar" class="fixed top-0 right-0 h-full w-full md:w-[450px] bg-black z-50 p-12 transform translate-x-full transition-transform duration-500 border-l border-cyan-500/20 flex flex-col">
        <div class="flex justify-between items-center mb-12 text-white">
            <h3 class="text-3xl font-black uppercase italic tracking-tighter">Your <span class="text-cyan-500">Cart</span></h3>
            <button onclick="toggleCart()" class="text-3xl">&times;</button>
        </div>
        <div id="cart-items" class="flex-grow overflow-y-auto space-y-4 mb-8 pr-2"></div>
        <div class="border-t border-cyan-500/10 pt-10 mt-auto">
            <div class="flex justify-between items-end mb-8">
                <span class="text-zinc-500 font-bold uppercase text-xs">Total</span>
                <span id="cart-total" class="text-4xl font-black text-white">$0.00</span>
            </div>
            <button onclick="window.location.href='index.html?openCart=true'" class="block text-center w-full bg-cyan-600 text-black py-6 rounded-2xl font-black uppercase tracking-widest hover:bg-white transition-all shadow-lg shadow-cyan-500/10">Go to Checkout</button>
        </div>
    </div>

    <script type="module">
        function parsePrefix(raw) {
            let html = raw;
            html = html.replace(/&#([A-Fa-f0-9]{6})&l/g, '</span><span style="color:#$1; font-weight:900;">');
            html = html.replace(/&8&l/g, '</span><span style="color:#555555; font-weight:900;">');
            html = html.replace(/&l/g, '');
            return `<span>${html}</span>`;
        }

        const rankData = [
            {
                id: 'rank_sensor',
                name: 'Sensor',
                price: 3.00,
                prefixRaw: '&8&l[&#FFFFFF&lS&#DFDFDF&lE&#B0B0B0&lN&#818181&lS&#525252&lO&#2D2D2D&lR&8&l]',
                global: ['Exclusive Sensor Prefix', '3 Homes: Set-locations', 'Fly in Spawn Access', '3-Hour Kit Cooldown'],
                armor: 'Netherite Gear (P5|U3|M)',
                trim: 'SENSOR | QUARTZ',
                weapons: [
                    'Sword (S5|U3|M)',
                    'Axe (S5|U4|E3|M)',
                    'Pickaxe (E5|U3|M)'
                ]
            },
            {
                id: 'rank_stalker',
                name: 'Stalker',
                price: 4.00,
                prefixRaw: '&8&l[&#00FF88&lS&#00D572&lT&#00AB5C&lA&#008046&lL&#005531&lK&#003322&lE&#00110B&lR&8&l]',
                global: ['Exclusive Stalker Prefix', '4 Homes: Set-locations', 'Fly in Spawn Access', '3-Hour Kit Cooldown'],
                armor: 'Netherite Gear (P5|U4|M)',
                trim: 'SILENCE | EMERALD',
                weapons: [
                    'Sword (S5|U4|M)',
                    'Axe (S5|U4|E6|M)',
                    'Pickaxe (E5|U4|M)'
                ]
            },
            {
                id: 'rank_warden',
                name: 'Warden',
                price: 5.00,
                prefixRaw: '&8&l[&#55FFFF&lW&#3BEDED&lA&#22DBDB&lR&#08C9C9&lD&#008E8E&lE&#001A33&lN&8&l]',
                global: ['Exclusive Warden Prefix', '5 Homes: Set-locations', 'Fly in Spawn Access', '3-Hour Kit Cooldown'],
                armor: 'Netherite Gear (P6|U4|M)',
                trim: 'WARD | DIAMOND',
                weapons: [
                    'Sword (S6|U4|M)',
                    'Axe (S6|U4|E6|M)',
                    'Pickaxe (E6|U4|M)'
                ]
            }
        ];
        
        let cart = JSON.parse(localStorage.getItem('echo_cart')) || {};
        const grid = document.getElementById('rank-grid');
        
        rankData.forEach(item => {
            const card = document.createElement('div');
            card.className = "rank-card p-10 rounded-[45px]";
            
            const prefixHtml = item.prefixRaw ? `
                <div class="mb-6">
                    <p class="text-[9px] uppercase font-bold text-zinc-600 tracking-widest mb-2 text-center">In-Game Preview</p>
                    <div class="mc-preview text-center">
                        ${parsePrefix(item.prefixRaw)} <span style="color: #fff">Player</span>
                    </div>
                </div>
            ` : '';

            card.innerHTML = `
                <div class="mb-6">
                    <h3 class="text-2xl font-black uppercase italic text-white">${item.name}</h3>
                    <div class="text-5xl font-black text-cyan-500 mt-2">$${item.price.toFixed(2)}</div>
                </div>
                
                ${prefixHtml}

                <div class="flex-grow">
                    <div class="perk-category">Global Access</div>
                    <div class="space-y-2 mb-4">
                        ${item.global.map(p => `
                            <div class="flex items-center gap-3">
                                <span class="w-1 h-1 bg-cyan-500 rounded-full"></span>
                                <p class="text-zinc-400 text-[10px] font-bold uppercase tracking-wider">${p}</p>
                            </div>
                        `).join('')}
                    </div>

                    <div class="perk-category">Kit Armor</div>
                    <div class="bg-zinc-900/40 p-3 rounded-xl border border-white/5 mb-4">
                        <p class="text-white text-[10px] font-black uppercase mb-1">${item.armor}</p>
                        <p class="text-cyan-500 text-[9px] font-bold uppercase tracking-tighter">TRIM: ${item.trim}</p>
                    </div>

                    <div class="perk-category">Kit Weapons</div>
                    <div class="space-y-1.5 mb-8">
                        ${item.weapons.map(w => `
                            <div class="flex items-center gap-3 bg-white/5 p-2 rounded-lg">
                                <p class="text-zinc-300 text-[9px] font-bold uppercase tracking-wider">${w}</p>
                            </div>
                        `).join('')}
                    </div>
                </div>

                <button onclick='addToCart(${JSON.stringify(item)})' class="w-full bg-cyan-500 text-black py-4 rounded-2xl font-black uppercase tracking-widest hover:bg-white transition-all">Add To Cart</button>
            `;
            grid.appendChild(card);
        });

        window.toggleCart = () => {
            document.getElementById('cart-sidebar').classList.toggle('cart-active');
            updateCartUI();
        };

        window.addToCart = (item) => {
            if (cart[item.id]) cart[item.id].quantity += 1;
            else cart[item.id] = { ...item, quantity: 1 };
            updateCartUI();
            document.getElementById('cart-sidebar').classList.add('cart-active');
        };

        window.removeFromCart = (id) => {
            delete cart[id];
            updateCartUI();
        };

        function updateCartUI() {
            const list = document.getElementById('cart-items');
            const totalDisplay = document.getElementById('cart-total');
            const countDisplay = document.getElementById('cart-count');
            const itemIds = Object.keys(cart);
            let total = 0, qty = 0;

            list.innerHTML = itemIds.length > 0 ? '' : '<p class="text-zinc-800 text-center py-20 font-black uppercase text-xs">Empty</p>';
            
            itemIds.forEach(id => {
                const item = cart[id];
                total += (item.price * item.quantity);
                qty += item.quantity;
                const row = document.createElement('div');
                row.className = "bg-zinc-900/50 p-6 rounded-3xl border border-cyan-500/10 flex justify-between items-center";
                row.innerHTML = `<div><p class="font-black uppercase text-xs text-white">${item.name}</p><p class="text-cyan-500 text-[9px] font-black">QTY: ${item.quantity}</p></div><button onclick="removeFromCart('${id}')" class="text-red-500 text-[9px] font-black uppercase">Remove</button>`;
                list.appendChild(row);
            });

            totalDisplay.innerText = `$${total.toFixed(2)}`;
            countDisplay.innerText = qty;
            localStorage.setItem('echo_cart', JSON.stringify(cart));
        }

        updateCartUI();
        document.getElementById('main-footer').addEventListener('contextmenu', (e) => e.preventDefault());
    </script>
</body>
</html>
