<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EchoDupe | Staff Team</title>
    <link rel="icon" type="image/png" href="assets/logo.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* Upgraded Background */
        .bg-grid {
            background-size: 50px 50px;
            background-image: linear-gradient(to right, rgba(6, 182, 212, 0.07) 1px, transparent 1px), 
                              linear-gradient(to bottom, rgba(6, 182, 212, 0.07) 1px, transparent 1px);
            position: fixed; inset: 0; z-index: -1;
        }
        .bg-glow {
            position: fixed; inset: 0;
            background: radial-gradient(circle at 50% -20%, rgba(6, 182, 212, 0.15) 0%, transparent 50%);
            z-index: -1; pointer-events: none;
        }

        /* Unified Staff Cards */
        .staff-card { 
            background: rgba(5, 5, 5, 0.8); 
            backdrop-filter: blur(16px); 
            border: 1px solid rgba(6, 182, 212, 0.1); 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            width: 100%;
        }
        .staff-card:hover { 
            transform: translateY(-10px); 
            border-color: #06b6d4; 
            box-shadow: 0 0 50px rgba(6, 182, 212, 0.2); 
        }

        .pulse { animation: pulse-animation 2.2s infinite; }
        @keyframes pulse-animation {
            0% { box-shadow: 0 0 0 0px rgba(6, 182, 212, 0.4); }
            100% { box-shadow: 0 0 0 10px rgba(6, 182, 212, 0); }
        }

        .section-title {
            letter-spacing: 0.5em;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            color: #06b6d4;
            margin-bottom: 3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
        }
        .section-title::before, .section-title::after {
            content: "";
            height: 1px;
            width: 50px;
            background: rgba(6, 182, 212, 0.2);
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #06b6d4; border-radius: 10px; }

        .no-select {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-glow"></div>

    <nav class="fixed top-0 w-full z-40 bg-black/80 border-b border-cyan-500/10 backdrop-blur-xl">
        <div class="max-w-7xl mx-auto flex justify-between items-center p-6">
            <div class="flex items-center gap-4">
                <div class="w-2.5 h-2.5 bg-cyan-500 rounded-full pulse"></div>
                <div class="hidden sm:block">
                    <p class="text-[10px] font-black text-zinc-500 uppercase tracking-tighter">Status</p>
                    <p class="text-xs font-bold uppercase"><span id="player-count">0</span> Online</p>
                </div>
            </div>

            <a href="index.html" class="text-3xl font-black italic text-cyan-500 tracking-tighter absolute left-1/2 -translate-x-1/2 select-none">
                ECHODUPE<span class="text-white">LS</span>
            </a>
            
            <div class="flex items-center gap-6">
                <a href="index.html" class="text-[10px] font-black uppercase tracking-widest text-zinc-400 hover:text-cyan-500 transition">Store</a>
            </div>
        </div>
    </nav>
    
    <div class="max-w-6xl mx-auto pt-44 pb-24 px-6">
        
        <section class="mb-32">
            <h2 class="section-title">High Staff Members</h2>
            <div id="high-staff-container" class="grid grid-cols-1 md:grid-cols-3 gap-8 justify-items-center">
                </div>
        </section>

        <section class="mb-32">
            <h2 class="section-title text-zinc-500">Staff Members</h2>
            <div id="staff-container" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-6 justify-items-center">
                </div>
        </section>

        <section class="mb-24">
            <h2 class="section-title text-zinc-500">Builders</h2>
            <div id="builders-container" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-6 justify-items-center">
                </div>
        </section>

        <footer id="main-footer" class="py-20 border-t border-cyan-500/10 mt-20 text-center no-select">
            <div class="max-w-7xl mx-auto px-6">
                <p class="text-[10px] font-black uppercase tracking-[0.4em] mb-4 text-zinc-700">
                    EchoDupeLS Official Staff Directory
                </p>
                <p class="text-[10px] font-black uppercase tracking-[0.4em] text-zinc-500 mb-2">
                    &copy; 2026 EchoDupeLS. All Rights Reserved.
                </p>
                <p class="text-[10px] font-black uppercase tracking-[0.4em] text-zinc-600">
                    Designed & Developed by <span class="text-cyan-500">Skitxoe</span>
                </p>
            </div>
        </footer>
    </div>

    <script src="Staff.js"></script>

    <script>
        function renderStaff() {
            // Safety check for the array
            if (typeof staffData === 'undefined') {
                console.error("Staff.js not found or staffData not defined!");
                return;
            }

            // Clear current content
            document.getElementById('high-staff-container').innerHTML = '';
            document.getElementById('staff-container').innerHTML = '';
            document.getElementById('builders-container').innerHTML = '';

            staffData.forEach(person => {
                const firstLetter = person.name.charAt(0).toUpperCase();
                let cardHtml = '';

                if (person.isHighStaff) {
                    // High Staff Style (Cyan Glow)
                    cardHtml = `
                    <div class="staff-card p-12 rounded-[45px] text-center border-t-2 border-cyan-500">
                        <div class="w-24 h-24 bg-zinc-950 border border-cyan-500/20 rounded-[30px] mx-auto mb-8 flex items-center justify-center text-4xl font-black italic text-cyan-500 shadow-2xl">${firstLetter}</div>
                        <h3 class="text-2xl font-black uppercase italic text-white">${person.name}</h3>
                        <p class="text-cyan-500 text-[10px] font-black uppercase tracking-[0.3em] mt-3">${person.role}</p>
                    </div>`;
                } else {
                    // Regular Staff Style (Subtle Zinc)
                    cardHtml = `
                    <div class="staff-card p-8 rounded-[35px] text-center border-t border-zinc-800">
                        <div class="w-16 h-16 bg-zinc-950 rounded-2xl mx-auto mb-4 flex items-center justify-center text-xl font-black italic text-white/50">${firstLetter}</div>
                        <h3 class="text-lg font-black uppercase italic text-white">${person.name}</h3>
                        <p class="text-zinc-500 text-[9px] font-black uppercase tracking-widest mt-2">${person.role}</p>
                    </div>`;
                }

                // Place in the correct container
                if (person.category === "high") {
                    document.getElementById('high-staff-container').innerHTML += cardHtml;
                } else if (person.category === "staff") {
                    document.getElementById('staff-container').innerHTML += cardHtml;
                } else if (person.category === "builders") {
                    document.getElementById('builders-container').innerHTML += cardHtml;
                }
            });
        }

        // Run render on load
        window.onload = renderStaff;

        // Anti-Right-Click for Footer
        const footer = document.getElementById('main-footer');
        if(footer) footer.addEventListener('contextmenu', (e) => e.preventDefault());

        // Simple Player Count Fluctuation
        function updatePlayerCount() {
            const display = document.getElementById('player-count');
            if(display) display.innerText = 15 + Math.floor(Math.random() * 5);
        }
        updatePlayerCount();
        setInterval(updatePlayerCount, 60000);
    </script>
</body>
</html>
